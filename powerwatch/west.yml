manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.4.1
      import:
        name-allowlist:
          - cmsis # CMSIS 5 (ARM core support)
          - cmsis_6 # CMSIS 6 (provides cmsis_core.h for Cortex-M)
          - hal_atmel # SAM4S register/HAL support

  self:
    path: powerwatch
